name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Check all features
        run: cargo check --all-targets --all-features

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rustdoc (mavkit package)
        run: cargo doc -p mavkit --all-features --no-deps

      - name: Unit tests with coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  python:
    needs: rust
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mavkit-python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Rustdoc (mavkit-python package)
        run: cargo doc -p mavkit-python --no-deps

      - name: Install dependencies
        run: uv sync

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Build extension
        run: uv run maturin develop

      - name: Mypy
        run: uv run mypy

      - name: Stubtest
        run: uv run python -m mypy.stubtest mavkit --concise --ignore-disjoint-bases --allowlist stubtest-allowlist.txt

      - name: Smoke test
        run: uv run python -c "import mavkit; print(dir(mavkit))"

      - name: Python tests
        run: uv run pytest tests/ -v

  wasm:
    needs: rust
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MAVKIT_WASM_FEATURES: ardupilot,byte-connection,sim,stream,wasm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen test runner
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.121

      - name: Wasm supported feature build check
        run: cargo check -p mavkit --target wasm32-unknown-unknown --no-default-features --features "$MAVKIT_WASM_FEATURES"

      - name: Wasm byte-connection test
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
        run: cargo test -p mavkit --target wasm32-unknown-unknown --no-default-features --features "$MAVKIT_WASM_FEATURES" --test wasm_byte_connection

      - name: Wasm sim unit tests
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
        run: cargo test -p mavkit --target wasm32-unknown-unknown --no-default-features --features "$MAVKIT_WASM_FEATURES" --test wasm_sim

      - name: Wasm demo suite
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
        run: cargo test -p mavkit --target wasm32-unknown-unknown --no-default-features --features "$MAVKIT_WASM_FEATURES" --test demo

  wasm-sitl:
    needs: wasm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen test runner
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.121

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: WASM SITL integration tests
        env:
          MAVKIT_WASM_SITL_RUST_FEATURES: ardupilot,byte-connection,sim,stream,wasm
        run: make test-wasm-sitl-strict

  sitl:
    needs: rust
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Integration tests
        run: make test-sitl-strict
