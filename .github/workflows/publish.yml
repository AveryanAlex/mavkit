name: Publish Crate

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches crate version
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          tag = os.environ["GIT_TAG"]
          if not tag.startswith("v"):
              raise SystemExit(f"Tag must start with 'v', got: {tag}")

          cargo_toml = tomllib.loads(pathlib.Path("Cargo.toml").read_text())
          version = cargo_toml["package"]["version"]
          if tag[1:] != version:
              raise SystemExit(
                  f"Tag version {tag[1:]} does not match Cargo.toml version {version}"
              )

          print(f"Tag {tag} matches Cargo.toml version {version}")
          PY

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
